<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>My Products</title>
  </head>
  <body>
    <nav>
      <a href="/">Home</a> |
      <a href="/register.html">Register</a> |
      <a href="/login.html">Login</a> |
      <a href="/dashboard">Dashboard</a> |
      <a href="/products.html">Products</a> |
      <a href="/orders.html">My Orders</a> |
      <a href="/seller-orders.html">Seller Orders</a>
    </nav>
    <h1>My Products</h1>
    <button id="refresh">Refresh</button>
    <ul id="myProducts"></ul>
    <p id="msg"></p>
    <script>
      const list = document.getElementById('myProducts');
      const refresh = document.getElementById('refresh');
      const msg = document.getElementById('msg');

      async function load() {
        const res = await fetch('/products/seller');
        if (!res.ok) return;
        const data = await res.json();
        list.innerHTML = data.products.map(product => `
          <li>
            ${product.title} - $${product.price}
            <button data-id="${product.id}" class="edit">Edit</button>
            <button data-id="${product.id}" class="delete">Delete</button>
          </li>
        `).join('');
        document.querySelectorAll('.edit').forEach(btn => {
          btn.addEventListener('click', async () => {
            const id = btn.dataset.id;
            const newPrice = prompt('New price');
            if (!newPrice) return;
            const res = await fetch(`/products/${id}`, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ price: Number(newPrice) }) });
            const json = await res.json();
            msg.textContent = res.ok ? 'Updated' : json.error || 'Error';
            load();
          });
        });
        document.querySelectorAll('.delete').forEach(btn => {
          btn.addEventListener('click', async () => {
            const id = btn.dataset.id;
            const res = await fetch(`/products/${id}`, { method: 'DELETE' });
            const json = await res.json();
            msg.textContent = res.ok ? 'Deleted' : json.error || 'Error';
            load();
          });
        });
      }

      refresh.addEventListener('click', load);
      load();
    </script>
  </body>
</html>
